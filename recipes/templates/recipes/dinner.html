{% extends 'base.html' %}

{% block content %}
<h1>Dinner Recipes</h1>

<div class="row">
    {% for meal in meals %}
        <div class="col-md-4 mb-4">
            <div class="card h-100">
                <img src="{{ meal.strMealThumb }}" class="card-img-top" alt="{{ meal.strMeal }}">
                <div class="card-body">
                    <h5 class="card-title">{{ meal.strMeal }}</h5>

                    <form method="POST" action="{% url 'save_api_recipe' %}">
                        {% csrf_token %}
                        <input type="hidden" name="title" value="{{ meal.strMeal }}">
                        <input type="hidden" name="description" value="Saved from dinner API results.">
                        <input type="hidden" name="image_url" value="{{ meal.strMealThumb }}">
                        <button type="submit" class="btn btn-primary">Save Recipe</button>
                    </form>
                </div>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
