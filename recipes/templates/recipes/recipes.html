{% extends "base.html" %}

{% block content %}
<h2>All Recipes</h2>

{% if recipes %}
    <ul>
        {% for recipe in recipes %}
            <li>
                <strong>{{ recipe.title }}</strong><br>
                {{ recipe.description }}
            </li>
            <hr>
        {% endfor %}
    </ul>
{% else %}
    <p>No recipes yet.</p>
{% endif %}
{% endblock %}
